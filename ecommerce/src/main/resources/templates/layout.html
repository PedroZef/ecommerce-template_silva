<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
    <!-- Fragmento de Head Comum -->
    <head th:fragment="head(title)">
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title th:text="${title} + ' | E-Commerce Premium'"></title>
        <!-- Folha de Estilo Customizada -->
        <link rel="stylesheet" th:href="@{/css/style.css}" />
        <link rel="stylesheet" th:href="@{/css/footer.css}" />
    </head>

    <body>
        <!-- Fragmento de Estrutura Completa -->
        <div
            th:fragment="layout-container(contentBody, activePage)"
            class="app-container"
        >
            <!-- Sidebar Estilo Glassmorphism -->
            <aside class="sidebar">
                <div class="brand">
                    <div class="brand-logo">
                        <!-- Ícone SVG de E-Commerce -->
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M17.21 9l-4.38-6.56c-.19-.28-.51-.42-.83-.42-.32 0-.64.14-.83.43L6.79 9H2c-.55 0-1 .45-1 1 0 .09.01.18.04.27l2.54 9.27c.23.84 1 1.46 1.88 1.46h13.08c.88 0 1.65-.62 1.88-1.46l2.54-9.27L23 10c0-.55-.45-1-1-1h-4.79zM9 9l3-4.5L15 9H9zm3 8c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"
                            />
                        </svg>
                    </div>
                    <h1>Sprint 1 MVC</h1>
                </div>

                <!-- Navegação Lateral Dinâmica -->
                <ul class="nav-menu">
                    <li
                        class="nav-item"
                        th:classappend="${activePage == 'dashboard' ? 'active' : ''}"
                    >
                        <a th:href="@{/}">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <rect x="3" y="3" width="7" height="9"></rect>
                                <rect x="14" y="3" width="7" height="5"></rect>
                                <rect x="14" y="12" width="7" height="9"></rect>
                                <rect x="3" y="16" width="7" height="5"></rect>
                            </svg>
                            Dashboard
                        </a>
                    </li>
                    <li
                        class="nav-item"
                        th:classappend="${activePage == 'categorias' ? 'active' : ''}"
                    >
                        <a th:href="@{/categorias}">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path
                                    d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
                                ></path>
                            </svg>
                            Categorias
                        </a>
                    </li>
                    <li
                        class="nav-item"
                        th:classappend="${activePage == 'produtos' ? 'active' : ''}"
                    >
                        <a th:href="@{/produtos}">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path
                                    d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
                                ></path>
                                <polyline
                                    points="3.27 6.96 12 12.01 20.73 6.96"
                                ></polyline>
                                <line x1="12" y1="22.08" x2="12" y2="12"></line>
                            </svg>
                            Produtos
                        </a>
                    </li>
                    <li
                        class="nav-item"
                        th:classappend="${activePage == 'clientes' ? 'active' : ''}"
                    >
                        <a th:href="@{/clientes}">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path
                                    d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"
                                ></path>
                                <circle cx="9" cy="7" r="4"></circle>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                            </svg>
                            Clientes
                        </a>
                    </li>
                    <li
                        class="nav-item"
                        th:classappend="${activePage == 'checkout' ? 'active' : ''}"
                    >
                        <a th:href="@{/checkout}">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path
                                    d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
                                ></path>
                            </svg>
                            Simulador ACID
                        </a>
                    </li>
                    <li
                        class="nav-item"
                        th:classappend="${activePage == 'pedidos' ? 'active' : ''}"
                    >
                        <a th:href="@{/pedidos}">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <path
                                    d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                                ></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <polyline points="10 9 9 9 8 9"></polyline>
                            </svg>
                            Histórico (Commit)
                        </a>
                    </li>
                </ul>
            </aside>

            <!-- Área de Conteúdo Principal Dinâmica -->
            <main class="main-content">
                <div class="content-wrapper">
                    <!-- Insere o corpo do conteúdo da página filha -->
                    <div th:replace="${contentBody}"></div>
                </div>

                <!-- Footer Global -->
                <footer class="main-footer">
                    <p>&copy; 2026 E-Commerce_T3 - Sprint MVC - Pedro Zeferino da Silva.</p>
                </footer>
            </main>
        </div>
    </body>
</html>
