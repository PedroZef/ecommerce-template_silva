<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:data-theme="${theme}">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - E-commerce</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/login.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
</head>

<body>
    <div class="container" th:classappend="${theme == 'light' ? 'light-theme' : ''}">
        <div class="login-container">
            <div class="login-header">
                <h2>E-commerce Login</h2>
                <p class="text-muted">Acesse o sistema</p>
                <div style="font-size: 0.85em; background: rgba(0, 0, 0, 0.05); padding: 10px; border-radius: 5px; margin-top: 10px;">
                    <strong>Credenciais de teste:</strong><br>
                    Admin: admin@admin.com / admin123<br>
                    Cliente: maria.silva@email.com / cliente123<br>
                    Cliente 2: joao.oliveira@email.com / cliente123
                </div>
            </div>

            <div th:if="${param.error}" class="alert alert-danger">
                Usuário ou senha inválidos.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                Você saiu do sistema com sucesso.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username" class="form-label">Usuário</label>
                    <input type="text" class="form-input" id="username" name="username" required autofocus />
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" class="form-input" id="password" name="password" required />
                </div>
                <div style="margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary">
                        Entrar
                    </button>
                </div>
            </form>

            <!-- Separador e Alternador de Tema -->
            <div style="margin: 1.5rem 0; border-top: 1px solid var(--border-glass);"></div>
            <div class="theme-toggle-container" style="border-top: none; padding-top: 0; margin-top: 0;">
                <form th:action="@{/theme/toggle}" method="post">
                    <input type="hidden" name="currentTheme" th:value="${theme}" />
                    <button type="submit" class="theme-toggle-btn"
                        th:title="${theme == 'light' ? 'Mudar para Tema Escuro' : 'Mudar para Tema Claro'}">
                        <div class="theme-toggle-track">
                            <div class="theme-toggle-thumb">
                                <!-- Ícone Sol (Light Mode) -->
                                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="5"></circle>
                                    <line x1="12" y1="1" x2="12" y2="3"></line>
                                    <line x1="12" y1="21" x2="12" y2="23"></line>
                                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                                    <line x1="1" y1="12" x2="3" y2="12"></line>
                                    <line x1="21" y1="12" x2="23" y2="12"></line>
                                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                                </svg>
                                <!-- Ícone Lua (Dark Mode) -->
                                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                                </svg>
                            </div>
                        </div>
                        <span class="theme-toggle-text"
                            th:text="${theme == 'light' ? 'Tema Claro' : 'Tema Escuro'}">Tema Escuro</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <p>
            &copy; 2026 E-Commerce Premium - Pedro Zeferino da Silva.
        </p>
    </footer>
</body>

</html>

</html>
